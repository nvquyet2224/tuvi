<section class="section search-result" id="search-result">
  <div class="search-result_wrap">
    <div class="search-result_txt">
      <h5 class="title" id="search-result-title">Kết quả tìm kiếm</h5>
      <div class="value" id="search-result-value">“ Ghế Inox “</div>
    </div>
    <div class="search-result_form hide" id="search-result-form">
      <div class="form_group">
        <input
          id="input-search-result"
          type="text"
          placeholder="Qui Phúc có thể giúp bạn tìm gì ?"
        />
        <div
          class="search-but action-icon search-but--clear"
          id="search-result--clear"
        >
          <svg class="symbol">
            <use xlink:href="#icon-close-cricle"></use>
          </svg>
        </div>
      </div>
      <div class="search-but action-icon" id="search-result-go-search">
        <svg class="symbol">
          <use xlink:href="#icon-search-el"></use>
        </svg>
      </div>
    </div>
  </div>
</section>
