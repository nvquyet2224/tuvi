<section class="section sub-banner">
    <div class="sub-banner--img">
        <picture>
            <source media="(max-width: 799px)" srcset="${spSrc}" />
            <source media="(min-width: 800px)" srcset="images/${img}.jpg" />
            <img width="1440" height="450" src="images/${img}.jpg" alt="${title}" />
        </picture>
    </div>
    <div class="sub-banner--txt">
        <div class="container">
            <div class="breadcrumb">
                <a href="index.html">Home</a>
                <span class="sep">/</span>
                <span class="current">${title}</span>
            </div>
            <div class="title_block">
                <h1 class="uppercase">${title}</h1>
            </div>
            <div class="sub-banner--desc">
                Grounded in 100% pure rubber. Engineered for the city, crafted for the mileage.
            </div>
        </div>
    </div>
</section>
