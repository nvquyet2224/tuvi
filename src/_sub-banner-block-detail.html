<section class="section sub-banner no-overlay">
    <div class="sub-banner--img">
        <picture>
            <source media="(max-width: 799px)" srcset="${spSrc}" />
            <source media="(min-width: 800px)" srcset="images/${img}.jpg" />
            <img width="1440" height="450" src="images/${img}.jpg" alt="${title}" />
        </picture>
    </div>
</section>
